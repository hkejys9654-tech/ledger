<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#7047d7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="가계부" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Garong's Ledger</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" href="./icon.png" />
  <link rel="apple-touch-icon" href="./icon.png" />

  <style>
    :root{
      --app-bg:#f8f7fc;
      --card:#ffffff;
      --ink:#15131c;
      --muted:#8a8496;
      --line:#ece8f4;
      --primary:#7047d7;
      --primary-2:#8c6bf0;
      --primary-soft:#efe8ff;
      --pink:#ff647c;
      --orange:#ffb15f;
      --blue:#5d7df5;
      --green:#43c7a5;
      --dark:#21182f;
      --danger:#ef4444;
      --warn:#f59e0b;
    }

    *{box-sizing:border-box;}
    html{background:var(--app-bg);}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;
      background:
        radial-gradient(circle at 15% -10%, rgba(112,71,215,.10), transparent 34%),
        radial-gradient(circle at 92% 0%, rgba(140,107,240,.10), transparent 32%),
        var(--app-bg);
      color:var(--ink);
      -webkit-tap-highlight-color:transparent;
      margin:0;
      padding:0;
      font-size:16px;
    }
    button,input,select,textarea{font-family:inherit;font-size:16px;}
    button{cursor:pointer;border:0;}
    input,select,textarea{outline:none;}

    .app-shell{
      width:100%;
      max-width:430px;
      min-height:100vh;
      margin:0 auto;
      background:rgba(248,247,252,.94);
      box-shadow:0 24px 80px rgba(41,31,66,.12);
      position:relative;
      overflow-x:hidden;
    }

    .app-header{
      position:sticky;
      top:0;
      z-index:50;
      height:82px;
      padding:16px 20px 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(248,247,252,.86);
      backdrop-filter:blur(24px);
      border-bottom:1px solid rgba(229,224,240,.62);
    }

    .header-center{text-align:center;min-width:0;}
    .app-title{font-size:15px;font-weight:900;color:#191622;letter-spacing:-.04em;line-height:1;}
    .app-subtitle{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:-.03em;line-height:1;margin-top:6px;}
    .header-date-input{
      appearance:none;
      background:transparent;
      border:none;
      padding:0;
      font-size:15px;
      font-weight:900;
      color:#191622;
      text-align:center;
      max-width:130px;
    }

    .app-main{padding:0 20px 132px;min-height:calc(100vh - 82px);}
    .view{display:none;animation:fadeIn .22s ease-out forwards;}
    .view.active{display:block;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .bottom-tabbar{
      position:fixed;
      left:50%;
      bottom:14px;
      transform:translateX(-50%);
      width:min(398px, calc(100% - 28px));
      height:76px;
      background:rgba(255,255,255,.88);
      backdrop-filter:blur(28px);
      border:1px solid rgba(229,224,240,.85);
      border-radius:30px;
      box-shadow:0 18px 50px rgba(48,32,76,.16);
      z-index:80;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      padding:9px 7px 8px;
    }
    .tab-button{
      background:transparent;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      color:#9d98a9;
      font-weight:900;
      font-size:10px;
      letter-spacing:-.05em;
      transition:.18s ease;
      border-radius:22px;
      position:relative;
    }
    .tab-button .tab-ico{width:22px;height:22px;display:flex;align-items:center;justify-content:center;line-height:1;}
    .svg-ico{width:20px;height:20px;display:block;stroke:currentColor;fill:none;stroke-width:2.15;stroke-linecap:round;stroke-linejoin:round;}
    .svg-ico.fill-soft{fill:currentColor;stroke:none;}
    .section-head{display:flex;align-items:center;gap:9px;}
    .section-head .section-svg{
      width:30px;height:30px;border-radius:12px;background:#f1ebff;color:var(--primary);
      display:flex;align-items:center;justify-content:center;flex:0 0 auto;
    }
    .mini-svg{
      width:24px;height:24px;border-radius:10px;background:#f6f2ff;color:#7047d7;
      display:flex;align-items:center;justify-content:center;flex:0 0 auto;
    }
    .tab-button.active{
      color:var(--primary);
      background:linear-gradient(180deg,#f0eaff,#ffffff);
      box-shadow:inset 0 0 0 1px rgba(112,71,215,.05);
    }
    .tab-button.active::after{
      content:"";
      position:absolute;
      bottom:4px;
      width:18px;
      height:3px;
      border-radius:99px;
      background:var(--primary);
      opacity:.85;
    }

    .card{
      background:rgba(255,255,255,.94);
      border:1px solid rgba(231,226,241,.9);
      box-shadow:0 16px 40px rgba(52,35,83,.08);
      border-radius:28px;
    }
    .glass-card{
      background:linear-gradient(135deg,rgba(122,85,225,.95),rgba(164,136,249,.86));
      box-shadow:0 22px 50px rgba(112,71,215,.25);
      border:1px solid rgba(255,255,255,.3);
      border-radius:28px;
      color:white;
    }
    .section-title{font-size:14px;font-weight:900;color:#262130;letter-spacing:-.04em;}
    .section-caption{font-size:11px;font-weight:800;color:#9c95aa;letter-spacing:-.03em;}
    .money{white-space:nowrap;font-weight:900;letter-spacing:-.04em;}

    .page-pad{padding-top:16px;display:flex;flex-direction:column;gap:18px;}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .btn{
      border-radius:16px;
      padding:12px 14px;
      font-weight:900;
      background:#fff;
      color:var(--primary);
      border:1px solid #eee8ff;
      box-shadow:0 8px 20px rgba(45,30,76,.05);
      transition:.15s;
    }
    .btn:active{transform:scale(.98);}
    .btn-primary{background:linear-gradient(90deg,var(--primary),var(--primary-2));color:white;border:0;}
    .btn-soft{background:#f1ebff;color:var(--primary);}
    .btn-gray{background:#f3f4f6;color:#64748b;}
    .btn-red{background:#fee2e2;color:#dc2626;}
    .btn-dark{background:var(--dark);color:white;}

    .field{
      width:100%;
      background:white;
      border:1px solid #ebe7f3;
      border-radius:15px;
      padding:10px 12px;
      font-weight:800;
      color:#302b3a;
      box-shadow:0 8px 20px rgba(45,30,76,.04);
    }
    .field:disabled{color:#6b7280;background:#f8fafc;}
    .label{font-size:11px;font-weight:900;color:#94a3b8;text-transform:uppercase;margin:0 0 6px 4px;}
    .sticky-panel{
      position:sticky;
      top:82px;
      z-index:30;
      background:rgba(248,247,252,.96);
      padding:18px 0;
      border-bottom:1px solid #e5e7eb;
      box-shadow:0 8px 16px rgba(52,35,83,.04);
    }

    .summary-dock{
      position:fixed;
      bottom:102px;
      left:0;
      right:0;
      max-width:430px;
      margin:0 auto;
      padding:0 24px;
      pointer-events:none;
      z-index:50;
    }
    .summary-box{
      background:rgba(33,24,47,.96);
      color:white;
      backdrop-filter:blur(20px);
      padding:18px;
      border-radius:28px;
      box-shadow:0 22px 50px rgba(20,15,30,.28);
      border:1px solid rgba(255,255,255,.10);
      pointer-events:auto;
    }

    .tiny-progress{height:5px;background:#f0edf6;border-radius:999px;overflow:hidden;}
    .tiny-progress>div{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--primary-2),var(--primary));}
    .donut{
      width:116px;
      height:116px;
      border-radius:999px;
      background:conic-gradient(#ded9e8 0% 100%);
      position:relative;
      flex:0 0 auto;
    }
    .donut::after{
      content:"";
      position:absolute;
      inset:26px;
      border-radius:999px;
      background:white;
      box-shadow:0 8px 20px rgba(55,35,85,.08);
    }
    .donut-center{
      position:absolute;
      inset:0;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      text-align:center;
      font-weight:900;
      color:#2b2635;
      font-size:12px;
      letter-spacing:-.04em;
      padding:30px;
    }

    .h-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
    .h-scroll::-webkit-scrollbar{display:none;}
    .method-card{
      background:#fbfaff;
      border:1px solid #eee9f6;
      border-radius:20px;
      padding:12px 10px;
      width:78px;
      flex:0 0 auto;
      text-align:center;
      box-shadow:0 8px 22px rgba(52,35,83,.05);
    }
    .method-icon{
      width:40px;
      height:40px;
      border-radius:16px;
      background:linear-gradient(135deg,#f5f0ff,#ffffff);
      color:#7047d7;
      margin:0 auto 8px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:inset 0 0 0 1px rgba(112,71,215,.08);
    }
    .method-icon .svg-ico{width:22px;height:22px;stroke-width:2.25;}
    .pill{
      font-size:10px;
      padding:3px 8px;
      border-radius:9px;
      font-weight:900;
      white-space:nowrap;
      background:#f1f5f9;
      color:#475569;
    }
    .pill-purple{background:#f1ebff;color:var(--primary);}
    .pill-red{background:#fee2e2;color:#dc2626;}
    .pill-amber{background:#fef3c7;color:#d97706;}
    .pill-blue{background:#dbeafe;color:#2563eb;}
    .pill-green{background:#d1fae5;color:#059669;}
    .pill-orange{background:#ffedd5;color:#ea580c;}

    .tx-card{
      background:white;
      padding:18px 18px;
      border-radius:28px;
      box-shadow:0 16px 40px rgba(52,35,83,.08);
      border:1px solid #eee9f6;
      display:flex;
      align-items:center;
      gap:14px;
      transition:.15s;
    }
    .tx-card:active{transform:scale(.985);}
    .tx-main{flex:1;min-width:0;}
    .tx-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
    .tx-title{font-size:14px;font-weight:900;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tx-note{font-size:11px;color:#64748b;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tx-method{font-size:11px;color:var(--primary);font-weight:900;margin-top:4px;}
    .delete-btn{
      width:38px;
      height:38px;
      border-radius:50%;
      color:#cbd5e1;
      background:#f8fafc;
      font-size:17px;
    }
    .delete-btn:active{background:#fee2e2;color:#dc2626;}

    .fab{
      position:fixed;
      bottom:110px;
      right:24px;
      width:64px;
      height:64px;
      background:linear-gradient(90deg,var(--primary),var(--primary-2));
      color:white;
      border-radius:999px;
      box-shadow:0 22px 40px rgba(112,71,215,.28);
      font-size:34px;
      line-height:1;
      z-index:60;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.6);
      backdrop-filter:blur(6px);
      z-index:120;
      align-items:flex-end;
      justify-content:center;
    }
    .modal.active{display:flex;}
    .modal-box{
      width:100%;
      max-width:480px;
      max-height:95vh;
      overflow:auto;
      background:white;
      border-radius:38px 38px 0 0;
      padding:28px;
      box-shadow:0 -22px 50px rgba(0,0,0,.18);
    }
    .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
    .modal-title{font-size:24px;font-weight:900;letter-spacing:-.05em;}
    .x-btn{
      width:44px;
      height:44px;
      border-radius:50%;
      background:#f8fafc;
      color:#64748b;
      font-size:22px;
    }
    .form-space{display:flex;flex-direction:column;gap:16px;}
    textarea.field{min-height:90px;resize:vertical;}
    .checkbox-card{
      display:flex;
      align-items:center;
      gap:10px;
      padding:14px;
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:18px;
      font-weight:900;
      color:#334155;
    }
    input[type="checkbox"]{width:22px;height:22px;accent-color:var(--primary);}

    .fixed-row{
      border-bottom:1px solid #f1f5f9;
      padding:11px 0;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .fixed-row:last-child{border-bottom:0;}
    .fixed-title{font-size:13px;font-weight:900;color:#475569;display:flex;align-items:center;gap:8px;min-width:0;}
    .fixed-title span.label-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .compact-money-grid{display:grid;grid-template-columns:66px 1fr 1fr;gap:6px;}
        .compact-money-grid .field{padding:0 7px!important;border-radius:11px!important;font-size:12px!important;height:34px!important;min-height:34px!important;max-height:34px!important;line-height:34px!important;}
    .mini-method{width:88px!important;padding:0 8px!important;border-radius:11px!important;font-size:12px!important;height:34px!important;min-height:34px!important;line-height:34px!important;}

    .planner-income-row{
      padding:9px 0!important;
      gap:6px!important;
    }
    .planner-income-row .fixed-title{
      font-size:13px!important;
      font-weight:900!important;
    }
    .planner-mini-field{
      height:36px!important;
      min-height:36px!important;
      padding:0 10px!important;
      border-radius:12px!important;
      font-size:13px!important;
      font-weight:800!important;
      box-shadow:0 5px 14px rgba(45,30,76,.035)!important;
    }
    .planner-day-field{
      width:78px!important;
      flex:0 0 78px!important;
    }
    .planner-amount-field{
      width:112px!important;
      flex:0 0 112px!important;
      text-align:right!important;
      margin-left:auto!important;
    }
    .planner-add-income-card{
      padding:10px!important;
      border-radius:18px!important;
    }
    .planner-total-compact{
      padding:13px 14px!important;
      border-radius:16px!important;
      margin-top:12px!important;
    }
    .group-title{
      font-size:11px;
      font-weight:900;
      color:#7c6ea0;
      letter-spacing:.02em;
      margin:16px 0 2px;
      padding-top:14px;
      border-top:1px solid #f1f5f9;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .toast{
      position:fixed;
      left:50%;
      bottom:196px;
      transform:translateX(-50%) translateY(20px);
      background:#111827;
      color:white;
      padding:12px 16px;
      border-radius:999px;
      font-size:13px;
      font-weight:900;
      opacity:0;
      pointer-events:none;
      transition:.2s;
      z-index:200;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    .error-box{
      margin:30px 20px;
      padding:18px;
      border-radius:20px;
      background:#fff1f2;
      color:#be123c;
      font-weight:800;
      line-height:1.6;
      border:1px solid #fecdd3;
    }


    /* v24: 고정예산/수입예산 입력칸 강제 소형화 */
    .planner-budget-line{
      display:grid!important;
      grid-template-columns:minmax(96px, 1fr) auto!important;
      align-items:center!important;
      gap:10px!important;
      padding:10px 0!important;
      border-bottom:1px solid #f1f5f9!important;
    }
    .planner-budget-line:last-child{border-bottom:0!important;}
    .planner-budget-line .fixed-title{
      font-size:14px!important;
      line-height:1.2!important;
      font-weight:900!important;
      color:#475569!important;
    }
    .planner-budget-controls{
      display:flex!important;
      align-items:center!important;
      justify-content:flex-end!important;
      gap:7px!important;
      min-width:0!important;
    }
    .planner-mini-field,
    .planner-budget-controls .field{
      -webkit-appearance:none!important;
      appearance:none!important;
      box-sizing:border-box!important;
      height:34px!important;
      min-height:34px!important;
      max-height:34px!important;
      line-height:34px!important;
      padding:0 9px!important;
      border-radius:11px!important;
      font-size:13px!important;
      font-weight:800!important;
      box-shadow:0 4px 12px rgba(45,30,76,.035)!important;
      margin:0!important;
    }
    .planner-day-field,
    .planner-budget-controls select{
      width:68px!important;
      flex:0 0 68px!important;
      text-align:center!important;
      text-align-last:center!important;
      background:#fff!important;
    }
    .planner-amount-field,
    .planner-budget-controls input{
      width:96px!important;
      flex:0 0 96px!important;
      text-align:right!important;
      background:#fff!important;
      color:#2f2a3a!important;
    }
    .planner-income-row{
      padding:0!important;
      gap:0!important;
      border-bottom:0!important;
    }
    .planner-income-card-compact{
      padding:16px!important;
    }
    .planner-income-card-compact .section-title{
      font-size:17px!important;
      margin-bottom:12px!important;
    }
    .planner-total-compact{
      padding:12px 13px!important;
      border-radius:15px!important;
      margin-top:12px!important;
      font-size:14px!important;
    }

    @media (min-width:700px){
      .bottom-tabbar{bottom:22px;}
      .app-shell{border-left:1px solid #ece8f4;border-right:1px solid #ece8f4;}
      .modal{align-items:center;padding:20px;}
      .modal-box{border-radius:32px;}
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="header-center">
        <input id="monthInput" type="month" class="header-date-input" />
        <div id="headerTitle" class="app-title" style="display:none;">대시보드</div>
        <div id="headerSub" class="app-subtitle">Garong's Ledger</div>
      </div>
    </header>

    <main class="app-main">
      <div id="loading" style="height:70vh;display:flex;align-items:center;justify-content:center;color:#7047d7;font-weight:900;">
        앱 불러오는 중...
      </div>

      <section id="view-dashboard" class="view"></section>
      <section id="view-planner" class="view"></section>
      <section id="view-ledger" class="view"></section>
      <section id="view-filter" class="view"></section>
      <section id="view-settings" class="view"></section>
    </main>

    <button id="fabAdd" class="fab" style="display:none;">+</button>

    <nav class="bottom-tabbar">
      <button class="tab-button active" data-tab="dashboard"><span class="tab-ico" data-nav-icon="home"></span><span>대시보드</span></button>
      <button class="tab-button" data-tab="planner"><span class="tab-ico" data-nav-icon="wallet"></span><span>고정예산</span></button>
      <button class="tab-button" data-tab="ledger"><span class="tab-ico" data-nav-icon="receipt"></span><span>변동지출</span></button>
      <button class="tab-button" data-tab="filter"><span class="tab-ico" data-nav-icon="filter"></span><span>지출필터</span></button>
      <button class="tab-button" data-tab="settings"><span class="tab-ico" data-nav-icon="settings"></span><span>시스템</span></button>
    </nav>
  </div>

  <div id="txModal" class="modal">
    <div class="modal-box">
      <div class="modal-head">
        <div id="txModalTitle" class="modal-title">기록하기</div>
        <button class="x-btn" data-close-modal="txModal">×</button>
      </div>
      <form id="txForm" class="form-space">
        <input type="hidden" id="txId" />
        <div>
          <div class="label">지출 일자</div>
          <input id="txDate" type="date" class="field" required />
        </div>
        <div class="grid-2">
          <div>
            <div class="label">카테고리</div>
            <select id="txCategory" class="field"></select>
          </div>
          <div>
            <div class="label">결제 수단</div>
            <select id="txMethod" class="field"></select>
          </div>
        </div>
        <div>
          <div class="label">내용</div>
          <input id="txDesc" type="text" class="field" placeholder="내용 입력" required />
        </div>
        <div>
          <div class="label">메모</div>
          <textarea id="txMemo" class="field" placeholder="상세 메모"></textarea>
        </div>
        <div>
          <div class="label">금액</div>
          <input id="txAmount" type="text" inputmode="numeric" class="field" placeholder="0" required style="font-size:24px;font-weight:900;color:#7047d7;text-align:right;" />
        </div>
        <label class="checkbox-card">
          <input id="txInstallment" type="checkbox" />
          <span style="flex:1;">할부 결제</span>

  <script>
    "use strict";

    window.addEventListener("error", function(event){

      if (loading) {
        loading.innerHTML = '<div class="error-box">앱을 켜는 중 오류가 났습니다.<br><br>오류: ' + String(event.message || "알 수 없음") + '<br><br>이 화면을 캡처해서 보내주면 원인을 더 정확히 잡을 수 있습니다.</div>';
      }
    });

    const FIXED_LABELS = {
      loanInterest: '대출이자',
      maintenance: '관리비',
      gas: '도시가스',
      commJiSeung: '통신비(지승)',

      main: '주수입',

    const PAYMENT_METHODS = ['롯데카드', '현대카드', '신한카드', '광주카드', '체크카드', '현금'];

    const state = {
      tab: 'dashboard',
      selectedDate: getLocalDateStr(),
      currentMonth: '',
      allData: { transactions: [], monthSheets: [] },

      plannerEditing: false,
      plannerTemp: null,
      ledgerMode: 'daily',
      ledgerSearch: '',

      filterStart: '',
      filterEnd: '',
      deleteTargetId: null
    };

    state.currentMonth = state.selectedDate.slice(0, 7);

    const DB_NAME = 'GarongLedger_v20_Final';
    const DB_VERSION = 1;

    const dbPromise = new Promise(function(resolve, reject){
      if (!("indexedDB" in window)) {
        reject(new Error("이 브라우저는 IndexedDB를 지원하지 않습니다."));
        return;
      }

      const req = indexedDB.open(DB_NAME, DB_VERSION);

      req.onupgradeneeded = function(e){
        const db = e.target.result;
        if (!db.objectStoreNames.contains('transactions')) {
          const store = db.createObjectStore('transactions', { keyPath: 'id' });
          store.createIndex('date', 'date');
        }
        if (!db.objectStoreNames.contains('monthSheets')) {
          db.createObjectStore('monthSheets', { keyPath: 'month' });
        }
      };

      req.onsuccess = function(e){ resolve(e.target.result); };
      req.onerror = function(){ reject(req.error || new Error("DB 열기 실패")); };
    });

    const dbOps = {
      getMonthSheet: async function(month){
        const db = await dbPromise;
        return new Promise(function(resolve, reject){
          const tx = db.transaction('monthSheets', 'readonly');
          const req = tx.objectStore('monthSheets').get(month);
          req.onsuccess = function(){
            const sheet = normalizeSheet(req.result || createInitialMonthSheet(month), month);
            resolve(sheet);
          };
          req.onerror = function(){ reject(req.error); };
        });
      },
      saveMonthSheet: async function(sheet){
        const db = await dbPromise;
        return new Promise(function(resolve, reject){
          const tx = db.transaction('monthSheets', 'readwrite');
          tx.objectStore('monthSheets').put(normalizeSheet(sheet, sheet.month));
          tx.oncomplete = resolve;
          tx.onerror = function(){ reject(tx.error); };
        });
      },
      getAllData: async function(){
        const db = await dbPromise;
        const txs = await new Promise(function(resolve, reject){
          const tx = db.transaction('transactions', 'readonly');
          const req = tx.objectStore('transactions').getAll();
          req.onsuccess = function(){ resolve(req.result || []); };
          req.onerror = function(){ reject(req.error); };
        });
        const sheets = await new Promise(function(resolve, reject){
          const tx = db.transaction('monthSheets', 'readonly');
          const req = tx.objectStore('monthSheets').getAll();
          req.onsuccess = function(){ resolve((req.result || []).map(s => normalizeSheet(s, s.month))); };
          req.onerror = function(){ reject(req.error); };
        });
        return { transactions: txs, monthSheets: sheets };
      },
      putTransaction: async function(txData){
        const db = await dbPromise;
        return new Promise(function(resolve, reject){
          const tx = db.transaction('transactions', 'readwrite');
          tx.objectStore('transactions').put(txData);
          tx.oncomplete = resolve;
          tx.onerror = function(){ reject(tx.error); };
        });
      },
      deleteTransaction: async function(id){
        const db = await dbPromise;
        return new Promise(function(resolve, reject){
          const tx = db.transaction('transactions', 'readwrite');
          tx.objectStore('transactions').delete(id);
          tx.oncomplete = resolve;
          tx.onerror = function(){ reject(tx.error); };
        });
      },
      restoreData: async function(data){
        const db = await dbPromise;
        return new Promise(function(resolve, reject){
          const tx = db.transaction(['transactions', 'monthSheets'], 'readwrite');
          const txStore = tx.objectStore('transactions');
          const sheetStore = tx.objectStore('monthSheets');
          txStore.clear();
          sheetStore.clear();

          (data.transactions || []).forEach(function(t){ txStore.put(t); });
          (data.monthSheets || []).forEach(function(s){ sheetStore.put(normalizeSheet(s, s.month)); });

          tx.oncomplete = resolve;
          tx.onerror = function(){ reject(tx.error); };
        });
      },
      clearAll: async function(){
        const db = await dbPromise;
        return new Promise(function(resolve, reject){
          const tx = db.transaction(['transactions', 'monthSheets'], 'readwrite');
          tx.objectStore('transactions').clear();
          tx.objectStore('monthSheets').clear();
          tx.oncomplete = resolve;
          tx.onerror = function(){ reject(tx.error); };
        });
      }
    };

    function sectionIcon(name){
      return `<span class="section-svg">${svgIcon(name)}</span>`;
    }

    function miniIcon(name){
      return `<span class="mini-svg">${svgIcon(name)}</span>`;
    }

    function hydrateStaticIcons(){
      document.querySelectorAll('[data-nav-icon]').forEach(function(el){
        el.innerHTML = svgIcon(el.dataset.navIcon);
      });
    }

    function getLocalDateStr(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function addMonths(dateStr, months){
      const parts = dateStr.split('-').map(Number);
      const y = parts[0], m = parts[1], d = parts[2];
      const date = new Date(y, m - 1 + months, d);
      if (date.getDate() !== d) date.setDate(0);
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    }

    function formatMoney(n){
      return (Number(n) || 0).toLocaleString('ko-KR') + '원';
    }

    function cleanMoney(s){
      if (!s) return 0;
      return Number(String(s).replace(/[^0-9]/g, '')) || 0;
    }

    function escapeHtml(s){
      return String(s ?? '').replace(/[&<>"']/g, function(ch){
        return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]);
      });
    }

    function deepClone(obj){
      return JSON.parse(JSON.stringify(obj));
    }

    function createInitialMonthSheet(month){
      const incomes = {};
      Object.keys(INCOME_LABELS).forEach(function(k){
        incomes[k] = { amount: 0, day: 1 };
      });
      incomes.additional = [];

      const fixedExpenses = {};
      Object.keys(FIXED_LABELS).forEach(function(k){
        fixedExpenses[k] = { planned: 0, actual: 0, day: 1, method: '현금' };
      });

      return { month, incomes, fixedExpenses };
    }

    function normalizeSheet(sheet, month){
      const next = sheet || createInitialMonthSheet(month);
      next.month = next.month || month;
      next.incomes = next.incomes || {};
      Object.keys(INCOME_LABELS).forEach(function(k){
        if (!next.incomes[k]) next.incomes[k] = { amount: 0, day: 1 };
        next.incomes[k].amount = Number(next.incomes[k].amount) || 0;
        next.incomes[k].day = Number(next.incomes[k].day) || 1;
      });
      if (!Array.isArray(next.incomes.additional)) next.incomes.additional = [];

      next.fixedExpenses = next.fixedExpenses || {};
      Object.keys(FIXED_LABELS).forEach(function(k){
        if (!next.fixedExpenses[k]) next.fixedExpenses[k] = { planned: 0, actual: 0, day: 1, method: '현금' };
        next.fixedExpenses[k].planned = Number(next.fixedExpenses[k].planned) || 0;
        next.fixedExpenses[k].actual = Number(next.fixedExpenses[k].actual) || 0;
        next.fixedExpenses[k].day = Number(next.fixedExpenses[k].day) || 1;
        next.fixedExpenses[k].method = next.fixedExpenses[k].method || '현금';
      });
      return next;
    }

    function getSheet(month){
      return state.allData.monthSheets.find(s => s.month === month) || createInitialMonthSheet(month);
    }

    async function loadData(){
      try {
        state.allData = await dbOps.getAllData();
        state.monthSheet = await dbOps.getMonthSheet(state.currentMonth);
        if (!state.plannerTemp || state.plannerTemp.month !== state.currentMonth) {
          state.plannerTemp = deepClone(state.monthSheet);
        }
        document.getElementById('loading').style.display = 'none';
        render();
      } catch (err) {
        document.getElementById('loading').innerHTML =
          '<div class="error-box">데이터를 불러오지 못했습니다.<br><br>' +
          escapeHtml(err.message || err) +
          '<br><br>아이폰 설정에서 Safari 저장공간이 막혔거나, 시크릿 모드일 수 있습니다.</div>';
      }
    }

    function showToast(text){
      const el = document.getElementById('toast');
      el.textContent = text;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 1800);
    }

    function openModal(id){
      document.getElementById(id).classList.add('active');
    }

    function closeModal(id){
      document.getElementById(id).classList.remove('active');
    }

    function setTab(tab){
      state.tab = tab;
      window.scrollTo(0, 0);
      render();
    }

    function render(){
      renderHeader();
      renderTabs();

      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const target = document.getElementById('view-' + state.tab);
      if (target) target.classList.add('active');

      document.getElementById('fabAdd').style.display = state.tab === 'ledger' ? 'block' : 'none';

      if (state.tab === 'dashboard') renderDashboard();
      if (state.tab === 'planner') renderPlanner();
      if (state.tab === 'ledger') renderLedger();
      if (state.tab === 'filter') renderFilter();
      if (state.tab === 'settings') renderSettings();

    function getMonthStats(month){
      const sheet = getSheet(month);
      const txs = state.allData.transactions.filter(t => t.date && t.date.startsWith(month));

      const income =
        Object.keys(INCOME_LABELS).reduce((sum,k) => sum + (sheet.incomes[k]?.amount || 0), 0) +
        (sheet.incomes.additional || []).reduce((sum,item) => sum + (Number(item.amount) || 0), 0);

      const fixed = Object.values(sheet.fixedExpenses).reduce((sum,v) => sum + (Number(v.actual) || 0), 0);
      const variable = txs.reduce((sum,t) => sum + (Number(t.amount) || 0), 0);
      const unnecessary = txs.filter(t => t.isUnnecessary).reduce((sum,t) => sum + (Number(t.amount) || 0), 0);
      const unexpected = txs.filter(t => t.isUnexpected).reduce((sum,t) => sum + (Number(t.amount) || 0), 0);

      return { sheet, txs, income, fixed, variable, totalExpense: fixed + variable, balance: income - fixed - variable, unnecessary, unexpected };
    }

        el.oninput = moneyInputHandler;
        el.onchange = () => { temp.incomes[el.dataset.key].amount = cleanMoney(el.value); renderPlanner(); };
      });

      document.querySelectorAll('.planner-fixed-day').forEach(el => {
        el.value = temp.fixedExpenses[el.dataset.key].day;
        el.onchange = () => { temp.fixedExpenses[el.dataset.key].day = Number(el.value); renderPlanner(); };
      });
      document.querySelectorAll('.planner-fixed-method').forEach(el => {
        el.value = temp.fixedExpenses[el.dataset.key].method;
        el.onchange = () => { temp.fixedExpenses[el.dataset.key].method = el.value; renderPlanner(); };
      });
      document.querySelectorAll('.planner-fixed-planned').forEach(el => {
        el.oninput = moneyInputHandler;
        el.onchange = () => { temp.fixedExpenses[el.dataset.key].planned = cleanMoney(el.value); renderPlanner(); };
      });
      document.querySelectorAll('.planner-fixed-actual').forEach(el => {
        el.oninput = moneyInputHandler;
        el.onchange = () => { temp.fixedExpenses[el.dataset.key].actual = cleanMoney(el.value); renderPlanner(); };

          const item = temp.incomes.additional.find(i => String(i.id) === String(el.dataset.id));

    async function loadPrevMonthData(type){
      const prevMonth = addMonths(state.currentMonth + '-01', -1).slice(0, 7);
      const prevSheet = await dbOps.getMonthSheet(prevMonth);
      Object.keys(FIXED_LABELS).forEach(function(k){
        if (prevSheet.fixedExpenses[k]) {
          state.plannerTemp.fixedExpenses[k][type] = prevSheet.fixedExpenses[k][type];
          state.plannerTemp.fixedExpenses[k].day = prevSheet.fixedExpenses[k].day;
          state.plannerTemp.fixedExpenses[k].method = prevSheet.fixedExpenses[k].method;
        }
      });
      renderPlanner();
      showToast('이전 달 자료를 가져왔어요');
    }

    function initFilterDatesIfNeeded(){
      if (state.filterStart && state.filterEnd) return;
      const parts = state.currentMonth.split('-').map(Number);
      const y = parts[0], m = parts[1];
      const lastDay = new Date(y, m, 0).getDate();
      state.filterStart = `${state.currentMonth}-01`;
      state.filterEnd = `${state.currentMonth}-${String(lastDay).padStart(2,'0')}`;
    }

    function getFilteredList(){
      const start = state.filterStart;
      const end = state.filterEnd;
      if (!start || !end) return [];

      const varList = state.allData.transactions
        .filter(t => t.date >= start && t.date <= end)
        .map(t => Object.assign({}, t, { type:'variable' }));

      const fixList = [];
      state.allData.monthSheets.forEach(function(sheet){
        Object.entries(sheet.fixedExpenses || {}).forEach(function(entry){
          const k = entry[0], v = entry[1];
          if ((Number(v.actual) || 0) <= 0) return;
          const date = `${sheet.month}-${String(v.day || 1).padStart(2,'0')}`;
          if (date >= start && date <= end) {
            fixList.push({
              id:`fixed_${sheet.month}_${k}`,
              date,
              desc:FIXED_LABELS[k] || k,
              category:'고정지출',
              amount:Number(v.actual) || 0,
              paymentMethod:v.method || '현금',
              type:'fixed'
            });
          }
        });
      });

      const combined = varList.concat(fixList);
      let list = [];

      if (state.filterType === 'method') {
        list = combined.filter(item => state.filterValue === '카드전체' ? item.paymentMethod !== '현금' : item.paymentMethod === state.filterValue);
      } else if (state.filterType === 'category') {
        list = combined.filter(item => item.type === 'variable' ? item.category === state.filterValue : item.desc === state.filterValue);
      } else if (state.filterType === 'fixed_card') {
        list = combined.filter(item => item.type === 'fixed' && (state.filterValue === '카드전체' ? item.paymentMethod !== '현금' : item.paymentMethod === state.filterValue));
      } else if (state.filterType === 'fixed_cash') {
        list = combined.filter(item => item.type === 'fixed' && item.paymentMethod === '현금');
      } else if (state.filterType === 'unnecessary') {
        list = combined.filter(item => item.type === 'variable' && item.isUnnecessary);
      } else if (state.filterType === 'unexpected') {
        list = combined.filter(item => item.type === 'variable' && item.isUnexpected);
      }

      return list.sort((a,b) => new Date(b.date) - new Date(a.date));
    }

    async function saveTxForm(e){
      e.preventDefault();

      const id = document.getElementById('txId').value;
      const date = document.getElementById('txDate').value;
      const amount = cleanMoney(document.getElementById('txAmount').value);
      const desc = document.getElementById('txDesc').value.trim();
      const memo = document.getElementById('txMemo').value.trim();
      const category = document.getElementById('txCategory').value;
      const paymentMethod = document.getElementById('txMethod').value;
      const isInstallment = document.getElementById('txInstallment').checked;
      const months = isInstallment ? Math.max(1, Number(document.getElementById('txInstallmentMonths').value) || 1) : 1;
      const isUnnecessary = document.getElementById('txUnnecessary').checked;
      const isUnexpected = document.getElementById('txUnexpected').checked;

      if (!date || !desc || amount <= 0) {
        alert('날짜, 내용, 금액을 확인해줘.');
        return;
      }

      if (isUnnecessary && isUnexpected) {
        if (!confirm('불필요한 지출과 예상외 지출이 동시에 체크되어 있습니다. 그래도 저장할까요?')) return;
      }

      const baseId = id || (String(Date.now()) + '_' + Math.random().toString(36).slice(2, 7));

      if (!id && months > 1) {
        const monthly = Math.floor(amount / months);
        const remainder = amount - monthly * months;
        for (let i=0; i<months; i++) {
          await dbOps.putTransaction({
            id: i === 0 ? baseId : `${baseId}_${i}`,
            date: addMonths(date, i),
            category,
            desc: `${desc} (${i+1}/${months})`,
            memo,
            amount: i === 0 ? monthly + remainder : monthly,
            paymentMethod,
            isInstallment: true,
            installmentMonths: months,
            isUnnecessary,
            isUnexpected
          });
        }
      } else {
        await dbOps.putTransaction({
          id: baseId,
          date,
          category,
          desc,
          memo,
          amount,
          paymentMethod,
          isInstallment,
          installmentMonths: months,
          isUnnecessary,
          isUnexpected
        });
      }

      closeModal('txModal');
      await loadData();
      showToast('저장 완료');
    }

    function exportCsv(){
      const s = getMonthStats(state.currentMonth);
      const rows = [];
      rows.push(['구분','날짜','카테고리','결제수단','내용','금액','메모']);

      Object.entries(s.sheet.fixedExpenses).forEach(function(entry){
        const k = entry[0], v = entry[1];
        if ((Number(v.actual) || 0) > 0) {
          rows.push(['고정지출', `${s.sheet.month}-${String(v.day || 1).padStart(2,'0')}`, '고정지출', v.method, FIXED_LABELS[k], v.actual, '']);
        }
      });

      s.txs.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(function(t){
        rows.push(['변동지출', t.date, t.category, t.paymentMethod, t.desc, t.amount, t.memo || '']);
      });

      const csv = '\ufeff' + rows.map(row => row.map(cell => `"${String(cell ?? '').replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `가계부_${state.currentMonth}.csv`;
      document.body.appendChild(a);
      a.click();
      setTimeout(function(){
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 0);
    }

      document.getElementById('restoreRunBtn').onclick = async function(){

          const end = raw.lastIndexOf('}');
          if (start < 0 || end < 0) throw new Error('JSON 형식이 아닙니다.');
          raw = raw.slice(start, end + 1);
          const data = JSON.parse(raw);
          await dbOps.restoreData(data);
          closeModal('restoreModal');
          await loadData();
          showToast('복구 완료');
        } catch (e) {
          alert('복구 실패: ' + (e.message || e));
        }
      };
    }

    document.addEventListener('DOMContentLoaded', async function(){
      try {
        initEvents();
        document.getElementById('monthInput').value = state.currentMonth;
        await loadData();
      } catch (err) {
        document.getElementById('loading').innerHTML =
          '<div class="error-box">앱 시작 실패<br><br>' + escapeHtml(err.message || err) + '</div>';
      }
    });
  </script>
</body>
</html>
